services:
  mongodb:
    image: mongo:7
    container_name: pppk_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  minio:
    image: minio/minio
    container_name: pppk_minio
    command: server /data --console-address ":9002"
    environment:
      MINIO_ROOT_USER: pppk_user
      MINIO_ROOT_PASSWORD: pppk_pass
    ports:
      - "9001:9000"
      - "9002:9002"
    volumes:
      - minio_data:/data
    restart: unless-stopped


  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: pppk_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: pppk_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    restart: unless-stopped

volumes:
  mongo_data:
  minio_data:
